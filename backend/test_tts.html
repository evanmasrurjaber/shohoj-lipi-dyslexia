<!DOCTYPE html>
<html>
<body>
<button onclick="playTTS()">Play TTS</button>
<br><br>
<audio id="player" controls></audio>
<p id="status">Click the button, then press play on the audio bar.</p>

<script>
async function playTTS() {
  document.getElementById("status").innerText = "Loading...";
  try {
    const res = await fetch("http://127.0.0.1:8000/tts", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({text: "আমি ভালো আছি"})
    });
    if (!res.ok) {
      document.getElementById("status").innerText = "Error: " + res.status;
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const player = document.getElementById("player");
    player.src = url;
    document.getElementById("status").innerText = "Loaded! Press ▶ on the player above.";
  } catch(e) {
    document.getElementById("status").innerText = "Failed: " + e.message;
  }
}
</script>
</body>
</html>
